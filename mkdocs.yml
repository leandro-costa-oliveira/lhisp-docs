# MkDocs Configuration for LHISP Documentation
site_name: LHISP Documentation
site_description: Documentação completa do sistema LHISP para clientes
site_author: LH Sistemas
site_url: https://docs.lhsistemas.com.br

# Repository
repo_name: lhistemas/lhisp-docs
repo_url: https://github.com/lhsistemas/lhisp-docs

# Copyright
copyright: "Copyright &copy; 2026 LH Sistemas"

# Documentation directory
docs_dir: docs

# Site directory
site_dir: site

# Theme
theme:
  name: material
  language: pt
  palette:
    # Primary color scheme
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/toggle-switch-off-outline
        name: Switch to dark mode
    # Dark color scheme
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/toggle-switch
        name: Switch to light mode
  font:
    text: Roboto
    code: Roboto Mono
  features:
    - navigation.instant
    - navigation.instant.progress
    - navigation.tracking
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy

# Plugins
plugins:
  - search

