# MkDocs Configuration for LHISP Documentation
site_name: LHISP Documentation
site_description: Documentação completa do sistema LHISP para clientes
site_author: LH Sistemas
site_url: https://docs.lhsistemas.com.br

# Repository
repo_name: lhistemas/lhisp-docs
repo_url: https://github.com/lhsistemas/lhisp-docs

# Copyright
copyright: "Copyright &copy; 2026 LH Sistemas"

# Documentation directory
docs_dir: docs

# Site directory
site_dir: site

# Theme
theme:
  name: material
  language: pt
  palette:
    # Primary color scheme
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/toggle-switch-off-outline
        name: Switch to dark mode
    # Dark color scheme
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/toggle-switch
        name: Switch to light mode
  font:
    text: Roboto
    code: Roboto Mono
  features:
    - navigation.instant
    - navigation.instant.progress
    - navigation.tracking
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy

# Plugins
plugins:
  - search

# Navigation
nav:
  - Início: index.md
  - Contratos:
      - Cadastrar novo cliente: contratos/cadastrar-novo-cliente.md
      - Adicionar serviço contratado: contratos/adicionar-servico-contratado.md
      - Adicionar acesso ao cliente: contratos/adicionar-acesso-cliente.md
      - Gerar contas do cliente: contratos/gerar-contas-cliente.md
  - Rede/Infra:
      - Cadastrar rede: rede-infra/cadastrar-rede.md
      - Prefixos de IP: rede-infra/prefixos-ip.md
      - CGNAT: rede-infra/cgnat.md
      - Monitor de Redes: rede-infra/monitor-redes.md
      - BRAS Huawei: rede-infra/bras-huawei.md
      - OLT Huawei: rede-infra/olt-huawei.md
      - Cadastrar servidor: rede-infra/cadastrar-servidor.md
      - Servidores: rede-infra/servidores.md
      - IPv6: rede-infra/ipv6.md

# Extensions
markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - toc:
      permalink: true
      toc_depth: 3
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true

# Extra
extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/lhsistemas
    - icon: material/web
      link: https://www.lhsistemas.com.br
